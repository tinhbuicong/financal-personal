version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: fiber_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-finance_db}
    ports:
      - "5432:5432"
    networks:
      - finance_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  finance_network:
    external: true

volumes:
  postgres_data: